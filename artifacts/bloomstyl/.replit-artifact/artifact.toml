kind = "web"
previewPath = "/"
title = "BloomStyl"
version = "1.0.0"
id = "artifacts/bloomstyl"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 21084
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/bloomstyl run dev"

[services.env]
PORT = "21084"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/bloomstyl", "run", "build"]
publicDir = "artifacts/bloomstyl/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
